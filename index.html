<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>월급 자동 계산기</title>
  <style>
    :root {
      --cafe: #facc15;
      --work: #f9a8d4;
      --side: #7c58d6;
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(17, 24, 39, 0.04);
    }
    .full { grid-column: 1 / -1; }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: 24px; }
    h2 { font-size: 18px; }
    h3 { font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; margin: 0 0 12px; }
    .small { font-size: 12px; color: var(--muted); margin: 6px 0 0; }
    .row, .row-3 {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    .row { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #374151;
    }
    input, select, button {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    button {
      background: #111827;
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { opacity: 0.92; }
    .inline-btn { width: auto; padding: 10px 14px; }
    .delete-btn { background: #ef4444; }
    .subtle-btn { background: #4b5563; }
    .category-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .category-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .category-btn {
      background: #e5e7eb;
      color: #111827;
      border: 1px solid #d1d5db;
      width: auto;
      padding: 8px 12px;
    }
    .context-menu {
      position: fixed;
      z-index: 40;
      min-width: 170px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      padding: 6px;
    }
    .context-menu.hidden { display: none; }
    .context-menu button {
      width: 100%;
      text-align: left;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #111827;
      padding: 8px 10px;
      font-weight: 500;
    }
    .context-menu button:hover {
      background: #f3f4f6;
      opacity: 1;
    }
    .category-btn.active { color: #fff; }
    .category-btn[data-category="cafe"].active {
      background: var(--cafe);
      border-color: var(--cafe);
    }
    .category-btn[data-category="work"].active {
      background: var(--work);
      border-color: var(--work);
    }
    .category-btn[data-category="side"].active {
      background: var(--side);
      border-color: var(--side);
    }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #374151;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }
    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .calendar-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .month-nav-btn {
      width: auto;
      padding: 4px 8px;
      background: transparent;
      color: #374151;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
    }
    .month-nav-btn:hover {
      background: transparent;
      border-color: #d1d5db;
    }
    .calendar-month-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .day.clickable {
      cursor: pointer;
    }
    .day.clickable:hover {
      border-color: #9ca3af;
    }
    .day.selected {
      outline: 2px solid #111827;
      outline-offset: -2px;
    }
    .day.drop-target {
      box-shadow: inset 0 0 0 2px #111827;
    }
    .dow, .day {
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 52px;
      padding: 5px;
      background: #fff;
    }
    .dow {
      min-height: auto;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .day-num {
      font-size: 12px;
      font-weight: 700;
    }
    .markers { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
    .empty { background: #f9fafb; border-style: dashed; }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fafafa;
    }
    .stat b {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: #4b5563;
    }
    .stat strong { font-size: 18px; }
    .result-extra {
      margin-top: 10px;
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 13px; color: #4b5563; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid #e5e7eb;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .schedule-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      background: #fcfcfd;
    }
    .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .chip {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      background: #fff;
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .chip button {
      width: auto;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #ef4444;
    }
    .day-records {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fcfcfd;
    }
    .day-record-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      font-size: 13px;
    }
    .day-record-item.draggable {
      cursor: grab;
    }
    .day-record-item.dragging {
      opacity: 0.55;
      border-style: dashed;
    }
    .day-record-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .day-record-delete {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      background: #ef4444;
      border-radius: 8px;
    }
    .day-record-save {
      width: auto;
      padding: 6px 10px;
      font-size: 12px;
      background: #374151;
      border-radius: 8px;
    }
    .day-record-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .day-record-edit-input {
      width: 160px;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 8px;
    }
    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .history-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 10px;
    }
    .week-nav-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .week-nav-buttons button {
      width: auto;
      padding: 6px 10px;
      background: transparent;
      color: #374151;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
    }
    .week-nav-buttons button:hover {
      border-color: #d1d5db;
    }
    .history-week-label {
      font-size: 13px;
      color: #fff;
      background: #111827;
      border: 1px solid #111827;
      border-radius: 999px;
      padding: 6px 12px;
      min-width: 104px;
      text-align: center;
      font-weight: 700;
    }
    .history-filter > div {
      min-width: 150px;
    }
    .history-week-summary {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #374151;
      justify-content: flex-end;
      text-align: right;
    }
    .history-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .history-toggle-btn {
      width: auto;
      padding: 8px 12px;
      background: #374151;
      min-width: 42px;
    }
    .history-collapsed {
      display: none;
    }
    .hidden-ui {
      display: none;
    }
    .schedule-form-collapsed {
      display: none;
    }
    .cloud-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .cloud-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cloud-actions button {
      width: auto;
      padding: 8px 12px;
    }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr 1fr; }
      .row-3, .row, .cloud-grid { grid-template-columns: 1fr; }
      .calendar-month-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card full hidden-ui">
      <h1>월급 자동 계산기</h1>
      <p class="muted">카페알바/근로는 최저시급 자동 계산, 카페알바는 세금 0.009 차감 후 반영됩니다.</p>
      <div class="row">
        <div>
          <label for="minimumWage">최저시급 (원)</label>
          <input id="minimumWage" type="number" min="0" step="10" value="10320" />
        </div>
        <div>
          <label for="monthPicker">조회 월</label>
          <input id="monthPicker" type="month" />
        </div>
      </div>
    </section>

    <section class="card full">
      <h2>KV 동기화 (Upstash/Vercel KV)</h2>
      <div class="cloud-grid">
        <div>
          <label for="syncUser">아이디</label>
          <input id="syncUser" type="text" />
        </div>
        <div>
          <label for="syncPin">비밀번호</label>
          <input id="syncPin" type="password" />
        </div>
      </div>
      <div class="cloud-actions">
        <button id="connectCloudBtn" type="button">연결</button>
        <button id="pullCloudBtn" type="button" class="subtle-btn">불러오기</button>
        <button id="pushCloudBtn" type="button" class="subtle-btn">저장하기</button>
      </div>
      <p id="cloudStatus" class="small"></p>
    </section>

    <section class="card full">
      <h2>이번 달 결과</h2>
      <div id="resultGrid" class="result-grid">
        <div class="stat">
          <b>최종 수령액</b>
          <strong id="grandTotal">0원</strong>
          <div class="result-extra">
            <div id="totalWorkTime">총 근무시간: 0시간 0분</div>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>기록 추가</h2>
      <div class="row">
        <div>
          <label for="workDate">날짜</label>
          <input id="workDate" type="date" />
        </div>
        <div>
          <label>카테고리</label>
          <input id="category" type="hidden" value="" />
          <div id="categoryButtons" class="category-buttons"></div>
          <button id="toggleCategoryFormBtn" type="button" class="subtle-btn inline-btn" style="margin-top:8px;">+ 카테고리 추가</button>
          <div id="categoryForm" class="schedule-form-collapsed" style="margin-top:10px;">
            <label for="newCategoryTitle">카테고리 이름</label>
            <input id="newCategoryTitle" type="text" />
            <label for="newCategoryColor">색상</label>
            <input id="newCategoryColor" type="color" value="#60a5fa" />
            <label for="newCategoryWage">시급 (원)</label>
            <input id="newCategoryWage" type="number" min="0" step="10" value="10320" />
            <label for="newCategoryTax">세금 비율 (예: 3.3)</label>
            <input id="newCategoryTax" type="number" min="0" step="0.1" value="3.3" />
            <label style="display:flex;align-items:center;gap:8px;margin-top:8px;">
              <input id="newCategoryIsDaily" type="checkbox" style="width:auto;" />
              일급(금액 직접입력) 방식 사용
            </label>
            <button id="saveCategoryBtn" type="button" style="margin-top:10px;">카테고리 등록</button>
          </div>
        </div>
      </div>

      <div id="cafeFields">
        <label for="cafeTimeInput">근무 시간 입력 (총 근무시간)</label>
        <input id="cafeTimeInput" type="text" />
        <label for="cafeWorkRange" style="margin-top:10px;">근무 일정 입력 (예: 13-16)</label>
        <input id="cafeWorkRange" type="text" />
      </div>

      <div id="workFields" style="display:none;">
        <label for="actualRange">실 근무 시간 (H 또는 HMM)</label>
        <input id="actualRange" type="text" />
        <label for="attendanceRange" style="margin-top:10px;">출근부 기재 시간 (여러 구간은 콤마)</label>
        <input id="attendanceRange" type="text" />
      </div>

      <div id="amountField" style="display:none;">
        <label for="sideAmount">부업 금액 (원)</label>
        <input id="sideAmount" type="number" min="0" step="100" value="0" />
        <label for="sideMemo" style="margin-top:10px;">부업 메모</label>
        <input id="sideMemo" type="text" />
      </div>

      <button id="addBtn" type="button">기록 저장</button>
      <p id="helper" class="small"></p>
    </section>

    <section id="scheduleSection" class="card">
      <h2 id="scheduleTitle">정기 스케줄</h2>
      <div id="scheduleForm" class="schedule-form-collapsed">
        <label id="scheduleInputLabel" for="scheduleInput">정기 입력 (예: 월13-16, 화오전9-오후1)</label>
        <input id="scheduleInput" type="text" />
        <button id="saveScheduleBtn" type="button">등록 저장</button>
      </div>
      <div class="row">
        <button id="addScheduleBtn" type="button">정기 스케줄 등록</button>
        <button id="applyScheduleBtn" type="button" class="subtle-btn">현재 조회 월 자동 반영</button>
      </div>
      <div class="schedule-box">
        <strong style="font-size:14px;">등록된 정기 스케줄</strong>
        <div id="scheduleList" class="chip-list"></div>
      </div>
    </section>

    <section class="card full">
      <div class="calendar-head">
        <div class="calendar-title-wrap">
          <button id="prevMonthBtn" type="button" class="month-nav-btn">&lt;</button>
          <h2 id="calendarMonthTitle" class="calendar-month-title">0000년 00월</h2>
          <button id="nextMonthBtn" type="button" class="month-nav-btn">&gt;</button>
        </div>
        <div id="legend" class="legend"></div>
      </div>
      <div id="calendar" class="calendar-grid"></div>
      <div id="calendarRecordPanel" class="day-records small">달력 날짜를 클릭하면 그날 기록을 여기서 삭제할 수 있어요.</div>
    </section>

    <section class="card full">
      <div class="history-head">
        <h2 style="margin:0;">기록 내역</h2>
        <button id="toggleHistoryBtn" type="button" class="history-toggle-btn">▼</button>
      </div>
      <div id="historyControls">
        <div class="history-top-row">
          <div class="week-nav-buttons">
            <button id="prevWeekBtn" type="button">&lt;</button>
            <span id="historyWeekLabel" class="history-week-label">-</span>
            <button id="nextWeekBtn" type="button">&gt;</button>
          </div>
          <div class="history-week-summary">
            <span id="historyCafeTime">카페: 0시간 0분</span>
            <span id="historyWorkTime">근로: 0시간 0분</span>
            <span id="historyTotalTime">총합: 0시간 0분</span>
          </div>
        </div>
        <div class="history-filter">
          <div>
            <label for="historyStartDate">시작일</label>
            <input id="historyStartDate" type="date" />
          </div>
          <div>
            <label for="historyEndDate">종료일</label>
            <input id="historyEndDate" type="date" />
          </div>
          <button id="clearHistoryFilterBtn" type="button" class="subtle-btn inline-btn">기간 초기화</button>
        </div>
      </div>
      <table id="historyTable">
        <thead>
          <tr>
            <th>날짜</th>
            <th>카테고리</th>
            <th>입력</th>
            <th>메모</th>
            <th>계산 결과</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </section>
    <div id="categoryContextMenu" class="context-menu hidden">
      <button id="moveCategoryBtn" type="button">다른 카테고리로 이동</button>
      <button id="deleteCategoryBtn" type="button">카테고리 삭제</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "salary-tracker-records-v2";
    const SCHEDULE_KEY = "salary-tracker-cafe-schedules-v1";
    const WORK_SCHEDULE_KEY = "salary-tracker-work-schedules-v1";
    const EXCLUDED_KEY = "salary-tracker-schedule-excluded-v1";
    const CATEGORY_CONFIG_KEY = "salary-tracker-category-config-v1";
    const CLOUD_CONFIG_KEY = "salary-tracker-cloud-config-v1";
    const DEFAULT_UPSTASH_REST_URL = "https://fun-primate-71536.upstash.io";
    const DEFAULT_UPSTASH_REST_TOKEN = "gQAAAAAAARdwAAIgcDEyNmE5ZWNhZmIyNjE0MTBjODBlYWYzOTAzODc5ZmYyNA";
    const BASE_CATEGORY_META = {};
    let CATEGORY_META = { ...BASE_CATEGORY_META };
    const WEEKDAY_LABEL = ["일", "월", "화", "수", "목", "금", "토"];

    const el = {
      minimumWage: document.getElementById("minimumWage"),
      monthPicker: document.getElementById("monthPicker"),
      syncUser: document.getElementById("syncUser"),
      syncPin: document.getElementById("syncPin"),
      connectCloudBtn: document.getElementById("connectCloudBtn"),
      pullCloudBtn: document.getElementById("pullCloudBtn"),
      pushCloudBtn: document.getElementById("pushCloudBtn"),
      cloudStatus: document.getElementById("cloudStatus"),
      workDate: document.getElementById("workDate"),
      category: document.getElementById("category"),
      cafeFields: document.getElementById("cafeFields"),
      workFields: document.getElementById("workFields"),
      amountField: document.getElementById("amountField"),
      cafeTimeInput: document.getElementById("cafeTimeInput"),
      cafeWorkRange: document.getElementById("cafeWorkRange"),
      actualRange: document.getElementById("actualRange"),
      attendanceRange: document.getElementById("attendanceRange"),
      sideAmount: document.getElementById("sideAmount"),
      sideMemo: document.getElementById("sideMemo"),
      addBtn: document.getElementById("addBtn"),
      helper: document.getElementById("helper"),
      categoryButtonsWrap: document.getElementById("categoryButtons"),
      toggleCategoryFormBtn: document.getElementById("toggleCategoryFormBtn"),
      categoryForm: document.getElementById("categoryForm"),
      newCategoryTitle: document.getElementById("newCategoryTitle"),
      newCategoryColor: document.getElementById("newCategoryColor"),
      newCategoryWage: document.getElementById("newCategoryWage"),
      newCategoryTax: document.getElementById("newCategoryTax"),
      newCategoryIsDaily: document.getElementById("newCategoryIsDaily"),
      saveCategoryBtn: document.getElementById("saveCategoryBtn"),
      scheduleInput: document.getElementById("scheduleInput"),
      scheduleTitle: document.getElementById("scheduleTitle"),
      scheduleInputLabel: document.getElementById("scheduleInputLabel"),
      scheduleForm: document.getElementById("scheduleForm"),
      scheduleSection: document.getElementById("scheduleSection"),
      saveScheduleBtn: document.getElementById("saveScheduleBtn"),
      addScheduleBtn: document.getElementById("addScheduleBtn"),
      applyScheduleBtn: document.getElementById("applyScheduleBtn"),
      scheduleList: document.getElementById("scheduleList"),
      resultGrid: document.getElementById("resultGrid"),
      grandTotal: document.getElementById("grandTotal"),
      totalWorkTime: document.getElementById("totalWorkTime"),
      calendar: document.getElementById("calendar"),
      historyBody: document.getElementById("historyBody"),
      historyTable: document.getElementById("historyTable"),
      historyControls: document.getElementById("historyControls"),

      start.setDate(start.getDate() + (7 * deltaWeek));

      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);

    function getHistoryWeekLabel() {
      if (!el.historyStartDate.value || !el.historyEndDate.value) return "-";

      const monthCount = {};
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = `${d.getFullYear()}-${d.getMonth() + 1}`;
        monthCount[key] = (monthCount[key] || 0) + 1;
      }
      const dominant = Object.entries(monthCount).sort((a, b) => b[1] - a[1])[0][0];

      let representative = null;
      for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        if (d.getFullYear() === y && d.getMonth() + 1 === m) {
          representative = d;
          break;

      }
      if (!representative) representative = new Date(y, m - 1, 1);

        method: "POST",
        headers: {

        body: JSON.stringify(command)

      const payload = await response.json();

      const { url, user, pin, syncKey } = readCloudConfigFromInputs();

    function rebuildCategoryMeta() {

    function findRelinkTargetForLegacy(legacyId, configs) {
      const defs = {
        cafe: { isDaily: false, keywords: ["카페", "알바", "cafe"] },
        work: { isDaily: false, keywords: ["근로", "work", "직장"] },
        side: { isDaily: true, keywords: ["부업", "side", "투잡"] }
      };
      const def = defs[legacyId];
      if (!def) return null;
      return configs.find((c) => {
        if (!!c.isDaily !== def.isDaily) return false;
        const normalizedTitle = normalizeCategoryText(c.title);
        return def.keywords.some((k) => normalizedTitle.includes(normalizeCategoryText(k)));
      }) || null;

    function relinkOrRecoverLegacyCategories() {
      const configs = loadCategoryConfigs();
      if (!configs.length) return;
      let records = loadRecords();
      let schedules = loadSchedules();
      let workSchedules = loadWorkSchedules();
      let nextConfigs = [...configs];
      let changedRecords = false;
      let changedSchedules = false;
      let changedWorkSchedules = false;
      let changedConfigs = false;
      const legacyDefaults = {
        cafe: { id: "cafe", title: "카페알바", color: "#facc15", wage: 10320, tax: 0.9, isDaily: false, isWorkStyle: false },
        work: { id: "work", title: "근로", color: "#f9a8d4", wage: 10320, tax: 0, isDaily: false, isWorkStyle: true },
        side: { id: "side", title: "부업", color: "#22c55e", wage: 0, tax: 0, isDaily: true, isWorkStyle: false }
      };
      ["cafe", "work", "side"].forEach((legacyId) => {
        const hasLegacyRecords = records.some((r) => r.category === legacyId);
        const hasLegacySchedules = schedules.some((s) => (s.category || "cafe") === legacyId) || workSchedules.some((s) => (s.category || "work") === legacyId);
        const hasLegacyData = hasLegacyRecords || hasLegacySchedules;
        if (!hasLegacyData) return;
        const alreadyExists = nextConfigs.some((c) => c.id === legacyId);
        if (alreadyExists) return;
        const target = findRelinkTargetForLegacy(legacyId, nextConfigs);
        if (target) {
          records = records.map((r) => (r.category === legacyId ? { ...r, category: target.id } : r));
          schedules = schedules.map((s) => ((s.category || "cafe") === legacyId ? { ...s, category: target.id } : s));
          workSchedules = workSchedules.map((s) => ((s.category || "work") === legacyId ? { ...s, category: target.id } : s));
          changedRecords = true;
          changedSchedules = true;
          changedWorkSchedules = true;
          return;
        }
        nextConfigs.push(legacyDefaults[legacyId]);
        changedConfigs = true;
      });
      if (changedRecords) saveRecords(records);
      if (changedSchedules) saveSchedules(schedules);
      if (changedWorkSchedules) saveWorkSchedules(workSchedules);
      if (changedConfigs) saveCategoryConfigs(nextConfigs);
    }

    function deleteCategory(id) {

      const records = loadRecords();

      const scheduleToDelete = schedules.filter((s) => (s.category || "cafe") === id);

      const msg = `${target.title} 카테고리를 삭제할까요?\n관련 기록 ${recordCount}개, 정기 스케줄 ${scheduleToDelete.length + workScheduleToDelete.length}개도 함께 삭제됩니다.`;
      if (!window.confirm(msg)) return;
      const remainList = list.filter((c) => c.id !== id);

      const remainSchedules = schedules.filter((s) => (s.category || "cafe") !== id);
      const remainWorkSchedules = workSchedules.filter((s) => (s.category || "work") !== id);
      const removedScheduleIds = new Set([...scheduleToDelete, ...workScheduleToDelete].map((s) => s.id));

      const optionsText = list.map((c, i) => `${i + 1}. ${c.title}`).join("\n");

        return;
      }
      moveCategoryData(contextCategoryId, target.id);
      hideCategoryContextMenu();
    }
    function minutesToText(mins) { return `${Math.floor(mins / 60)}시간 ${mins % 60}분`; }
    function normalizeRangeText(text) { return String(text).replace(/\s+/g, ""); }

    function parseSingleTimeToMinutes(text) {
      const src = normalizeRangeText(text);
      if (!src) return null;

      const meridiemMatch = src.match(/^(오전|오후)(.+)$/);
      let meridiem = null;
      let body = src;
      if (meridiemMatch) {
        meridiem = meridiemMatch[1];
        body = meridiemMatch[2];
      }

      body = body.replace(/시/g, ":").replace(/분/g, "");
      let hour = null;
      let minute = 0;

      if (body.includes(":")) {
        const [h, m] = body.split(":");
        if (!h || m === undefined || m === "") return null;
        hour = Number(h);
        minute = Number(m);
      } else {
        const digits = body.replace(/\D/g, "");
        if (!digits) return null;
        if (digits.length <= 2) {
          hour = Number(digits);
          minute = 0;
        } else if (digits.length === 3) {
          hour = Number(digits.slice(0, 1));
          minute = Number(digits.slice(1, 3));
        } else if (digits.length === 4) {
          hour = Number(digits.slice(0, 2));
          minute = Number(digits.slice(2, 4));
        } else {
          return null;
        }
      }

      if (minute < 0 || minute > 59 || hour == null || Number.isNaN(hour)) return null;

      if (meridiem) {
        if (hour < 1 || hour > 12) return null;
        if (meridiem === "오전") {
          hour = hour === 12 ? 0 : hour;
        } else {
          hour = hour === 12 ? 12 : hour + 12;
        }
      } else if (hour < 0 || hour > 23) {
        return null;
      }

      return (hour * 60) + minute;
    }

    function formatClock(mins) {
      const m = ((mins % (24 * 60)) + (24 * 60)) % (24 * 60);
      const h = Math.floor(m / 60);
      const mm = m % 60;
      return `${pad(h)}:${pad(mm)}`;
    }

    function parseTimeRange(rangeText) {
      const src = normalizeRangeText(rangeText).replace(/~/g, "-");
      const parts = src.split("-");
      if (parts.length !== 2) return null;
      const start = parseSingleTimeToMinutes(parts[0]);
      const endRaw = parseSingleTimeToMinutes(parts[1]);
      if (start == null || endRaw == null) return null;
      let end = endRaw;
      if (end <= start) end += 24 * 60;
      return {
        start,
        end,
        minutes: end - start,
        normalized: `${formatClock(start)}-${formatClock(endRaw)}`
      };
    }

    function parseTimeRangeToMinutes(rangeText) {
      const parsed = parseTimeRange(rangeText);
      return parsed ? parsed.minutes : null;
    }

    function parseMultipleTimeRanges(text) {
      const raw = String(text || "").trim();
      if (!raw) return null;
      const parts = raw.split(",").map((p) => p.trim()).filter(Boolean);
      if (parts.length === 0) return null;
      const parsedParts = [];
      let total = 0;
      for (const part of parts) {
        const parsed = parseTimeRange(part);
        if (!parsed) return null;
        parsedParts.push(parsed.normalized);
        total += parsed.minutes;
      }
      return {
        minutes: total,
        normalized: parsedParts.join(", ")
      };
    }

    function parseCafeTimeToMinutes(text) {
      const digits = String(text || "").replace(/\D/g, "");
      if (digits.length === 1) {
        const hours = Number(digits);
        if (hours < 0 || hours > 9) return null;
        return hours * 60;
      }
      if (digits.length === 3) {
        const hours = Number(digits.slice(0, 1));
        const minutes = Number(digits.slice(1, 3));
        if (hours > 9 || minutes > 59) return null;
        return (hours * 60) + minutes;
      }
      return null;
    }

    function parseWeekdayAndWorkRangeInput(text) {
      const src = normalizeRangeText(text);
      const m = src.match(/^([월화수목금토일])(.+)$/);
      if (!m) return null;
      const map = { 일: 0, 월: 1, 화: 2, 수: 3, 목: 4, 금: 5, 토: 6 };
      const weekday = map[m[1]];
      const workRangeParsed = parseTimeRange(m[2]);
      if (!workRangeParsed) return null;
      return {
        weekday,
        minutes: workRangeParsed.minutes,
        workRange: workRangeParsed.normalized
      };
    }
    function getActiveScheduleCategory() { return el.category.value; }

    function formatMinutesToCafeInput(mins) {
      const total = Number(mins) || 0;
      const h = Math.floor(total / 60);
      const m = total % 60;
      if (m === 0) return String(h);
      return `${h}${pad(m)}`;
    }

    function getActualWorkMinutes(record) {
      if (record.actualMinutes != null) return Number(record.actualMinutes) || 0;
      return parseTimeRangeToMinutes(record.actualRange || "") || 0;
    }
    function getHourlyCategoryMinutes(totalText, rangeText) {
      const totalMinutes = parseCafeTimeToMinutes(totalText);
      const rangeParsed = rangeText ? parseTimeRange(rangeText) : null;
      if (!totalMinutes && !rangeParsed) return null;
      return {
        minutes: totalMinutes || (rangeParsed ? rangeParsed.minutes : 0),
        workRange: rangeParsed ? rangeParsed.normalized : ""
      };
    }

    function getCategoryInputText(record) {
      const cfg = getCategoryConfig(record.category);
      if (cfg && !cfg.isWorkStyle) {
        if (cfg.isDaily) return fmtMoney(record.amount || 0);
        return minutesToText(record.minutes || 0);
      }
      if (record.category === "cafe") return minutesToText(record.minutes || 0);
      if (record.category === "work") return minutesToText(getActualWorkMinutes(record));
      return fmtMoney(record.amount || 0);
    }

    function computeEntry(record, minimumWage) {
      const cfg = getCategoryConfig(record.category);
      if (cfg && !cfg.isWorkStyle) {
        if (cfg.isDaily) {
          const amount = Number(record.amount) || 0;
          return { pay: amount, resultText: fmtMoney(amount) };
        }
        const wage = cfg.wage > 0 ? cfg.wage : minimumWage;
        const gross = ((Number(record.minutes) || 0) / 60) * wage;
        const taxRate = (cfg.tax || 0) > 1 ? (cfg.tax || 0) / 100 : (cfg.tax || 0);
        const tax = gross * taxRate;
        const net = gross - tax;
        return { pay: net, resultText: tax > 0 ? `${fmtMoney(net)} (세금 ${fmtMoney(tax)} 차감)` : fmtMoney(net) };
      }
      if (record.category === "side") {
        const amount = Number(record.amount) || 0;
        return { pay: amount, resultText: fmtMoney(amount) };
      }
      if (record.category === "cafe") {
        const gross = ((Number(record.minutes) || 0) / 60) * minimumWage;
        const tax = gross * 0.009;
        const net = gross - tax;
        return { pay: net, resultText: `${fmtMoney(net)} (세금 ${fmtMoney(tax)} 차감)` };
      }
      const workMinutes = getActualWorkMinutes(record);
      const gross = ((workMinutes || 0) / 60) * minimumWage;
      return { pay: gross, resultText: fmtMoney(gross) };
    }

      const monthValue = el.monthPicker.value;
      const active = getActiveScheduleCategory();
      const schedules = loadSchedules().filter((s) => (s.category || "cafe") === active);
      if (!monthValue || schedules.length === 0) return alert("조회 월 또는 정기 스케줄을 확인해주세요.");

      const [year, month] = monthValue.split("-").map(Number);
      const lastDate = new Date(year, month, 0).getDate();
      const records = loadRecords();
      const excluded = new Set(loadExcluded());
      const existingKey = new Set(records.map((r) => `${r.date}|${r.scheduleId || ""}|${r.category}`));

      schedules.forEach((s) => {
        for (let day = 1; day <= lastDate; day++) {
          const dateObj = new Date(year, month - 1, day);
          if (dateObj.getDay() !== s.weekday) continue;
          const date = `${monthValue}-${pad(day)}`;
          const exKey = `${s.id}|${date}`;
          const key = `${date}|${s.id}|${active}`;
          if (excluded.has(exKey) || existingKey.has(key)) continue;

            category: active,
            minutes: s.minutes,
            workRange: s.workRange || "",
            generatedBySchedule: true,
            scheduleId: s.id

          existingKey.add(key);
        }

      const entries = Object.entries(minutesByCategory);
      el.historyCafeTime.textContent = entries[0] ? `${getCategoryMetaSafe(entries[0][0]).label}: ${minutesToText(entries[0][1])}` : "";
      el.historyWorkTime.textContent = entries[1] ? `${getCategoryMetaSafe(entries[1][0]).label}: ${minutesToText(entries[1][1])}` : "";
      if (entries.length <= 1) el.historyWorkTime.textContent = "";
      el.historyTotalTime.textContent = `총합: ${minutesToText(total)}`;
    }

    function applyHistoryDateFilter(records) {
      const start = el.historyStartDate.value;
      const end = el.historyEndDate.value;
      return records.filter((r) => {
        if (start && r.date < start) return false;
        if (end && r.date > end) return false;
        return true;
      });
    }

    function renderHistoryVisibility() {
      const collapsed = isHistoryCollapsed;
      el.toggleHistoryBtn.textContent = collapsed ? "▶" : "▼";
      el.historyControls.classList.toggle("history-collapsed", collapsed);
      el.historyTable.classList.toggle("history-collapsed", collapsed);
    }

    function renderCalendar(filteredRecords, monthValue) {
      el.calendar.innerHTML = "";
      ["일", "월", "화", "수", "목", "금", "토"].forEach((d) => {
        const node = document.createElement("div");
        node.className = "dow";
        node.textContent = d;
        el.calendar.appendChild(node);
      });

      const [year, month] = monthValue.split("-").map(Number);
      const firstDay = new Date(year, month - 1, 1);
      const lastDate = new Date(year, month, 0).getDate();
      const startDow = firstDay.getDay();
      const groupedByDate = {};
      filteredRecords.forEach((r) => {
        if (!groupedByDate[r.date]) groupedByDate[r.date] = [];
        groupedByDate[r.date].push(r.category);
      });

      for (let i = 0; i < startDow; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        el.calendar.appendChild(empty);
      }
      for (let day = 1; day <= lastDate; day++) {
        const date = `${monthValue}-${pad(day)}`;
        const categories = groupedByDate[date] ? groupedByDate[date] : [];
        const cell = document.createElement("div");
        cell.className = "day";
        cell.dataset.date = date;
        cell.classList.add("clickable");
        if (selectedCalendarDate === date) cell.classList.add("selected");
        cell.innerHTML = `<div class="day-num">${day}</div><div class="markers"></div>`;
        const markers = cell.querySelector(".markers");
        categories.forEach((cat) => {
          const m = document.createElement("span");
          m.className = "dot";
          m.style.background = getCategoryMetaSafe(cat).color;
          markers.appendChild(m);
        });
        cell.addEventListener("click", () => {
          selectedCalendarDate = date;
          el.workDate.value = date;
          clearEntryDraftInputs();
          setHistoryWeekByDate(date);
          render();
        });
        cell.addEventListener("dragover", (e) => {
          e.preventDefault();
          cell.classList.add("drop-target");
        });
        cell.addEventListener("dragleave", () => {
          cell.classList.remove("drop-target");
        });
        cell.addEventListener("drop", (e) => {
          e.preventDefault();
          cell.classList.remove("drop-target");
          const recordId = e.dataTransfer.getData("text/plain");
          if (!recordId) return;
          moveRecordToDate(recordId, date);
        });
        el.calendar.appendChild(cell);
      }
    }

    function renderCalendarRecordPanel(filteredRecords, minimumWage, monthValue) {
      if (!selectedCalendarDate || !selectedCalendarDate.startsWith(monthValue)) {
        el.calendarRecordPanel.innerHTML = "달력 날짜를 클릭하면 그날 기록을 여기서 삭제할 수 있어요.";
        el.calendarRecordPanel.classList.add("small");
        return;
      }
      const dayRecords = filteredRecords.filter((r) => r.date === selectedCalendarDate);
      if (dayRecords.length === 0) {
        el.calendarRecordPanel.innerHTML = `${selectedCalendarDate}에는 기록이 없습니다.`;
        el.calendarRecordPanel.classList.add("small");
        return;
      }

      el.calendarRecordPanel.classList.remove("small");
      el.calendarRecordPanel.innerHTML = `<strong style="font-size:14px;">${selectedCalendarDate} 기록</strong><p class="small">수정 후 저장하면 해당 날짜 기록이 바로 갱신됩니다.</p>`;
      dayRecords.forEach((record) => {
        const meta = getCategoryMetaSafe(record.category);
        const result = computeEntry(record, minimumWage);
        const cfg = getCategoryConfig(record.category);
        const editInputs = cfg && !cfg.isWorkStyle
          ? (cfg.isDaily
            ? `
              <input class="day-record-edit-input" data-edit-id="${record.id}" data-edit-field="amount" type="number" min="0" value="${record.amount || 0}" />
              <input class="day-record-edit-input" data-edit-id="${record.id}" data-edit-field="sideMemo" type="text" value="${record.sideMemo || ""}" />
            `
            : `<input class="day-record-edit-input" data-edit-id="${record.id}" data-edit-field="cafeTime" type="text" value="${formatMinutesToCafeInput(record.minutes)}" />`)
          : `
            <input class="day-record-edit-input" data-edit-id="${record.id}" data-edit-field="actualRange" type="text" value="${formatMinutesToCafeInput(getActualWorkMinutes(record))}" />
            <input class="day-record-edit-input" data-edit-id="${record.id}" data-edit-field="attendanceRange" type="text" value="${String(record.attendanceRange || "").startsWith("동일(") ? "" : (record.attendanceRange || "")}" />
          `;
        const row = document.createElement("div");
        row.className = "day-record-item draggable";
        row.draggable = true;
        row.dataset.recordId = record.id;
        row.innerHTML = `
          <div>
            <span class="tag"><i class="dot" style="background:${meta.color}"></i>${meta.label}</span>
            <span style="margin-left:8px;">${getCategoryInputText(record)} / ${result.resultText}</span>
          </div>
          <div class="day-record-actions">
            ${editInputs}
            <button type="button" class="day-record-save" data-save-id="${record.id}">수정</button>
            <button type="button" class="day-record-delete" data-id="${record.id}">삭제</button>
          </div>
        `;
        row.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", record.id);
          e.dataTransfer.effectAllowed = "move";
          row.classList.add("dragging");
        });
        row.addEventListener("dragend", () => {
          row.classList.remove("dragging");
          Array.from(el.calendar.querySelectorAll(".day.drop-target")).forEach((d) => d.classList.remove("drop-target"));
        });
        el.calendarRecordPanel.appendChild(row);
      });
      Array.from(el.calendarRecordPanel.querySelectorAll("button[data-id]")).forEach((btn) => {
        btn.addEventListener("click", () => removeRecord(btn.dataset.id));
      });
      Array.from(el.calendarRecordPanel.querySelectorAll("button[data-save-id]")).forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.saveId;
          const target = dayRecords.find((r) => r.id === id);
          if (!target) return;
          const cfg = getCategoryConfig(target.category);
          if (cfg && !cfg.isWorkStyle && !cfg.isDaily) {
            const input = el.calendarRecordPanel.querySelector(`[data-edit-id="${id}"][data-edit-field="cafeTime"]`);
            const minutes = parseCafeTimeToMinutes(input ? input.value : "");
            if (!minutes || minutes <= 0) return alert("카페 시간은 945 또는 9 형식으로 입력해주세요.");
            updateRecord(id, { minutes }, true);
            return;
          }
          if (cfg && cfg.isWorkStyle) {
            const actualInput = el.calendarRecordPanel.querySelector(`[data-edit-id="${id}"][data-edit-field="actualRange"]`);
            const attendanceInput = el.calendarRecordPanel.querySelector(`[data-edit-id="${id}"][data-edit-field="attendanceRange"]`);
            const actualMinutes = parseCafeTimeToMinutes(actualInput ? actualInput.value : "");
            const attendanceValue = attendanceInput ? attendanceInput.value : "";
            const attendanceParsed = attendanceValue ? parseMultipleTimeRanges(attendanceValue) : null;
            if (!actualMinutes || actualMinutes <= 0) return alert("실근무 시간은 H 또는 HMM 형식으로 입력해주세요.");
            if (attendanceValue && !attendanceParsed) return alert("출근부 시간 형식을 확인해주세요. 여러 구간은 콤마로 구분합니다.");
            updateRecord(
              id,
              {
                actualMinutes,
                attendanceRange: attendanceParsed ? attendanceParsed.normalized : `동일(${minutesToText(actualMinutes)})`
              },
              true
            );
            return;
          }
          const amountInput = el.calendarRecordPanel.querySelector(`[data-edit-id="${id}"][data-edit-field="amount"]`);
          const sideMemoInput = el.calendarRecordPanel.querySelector(`[data-edit-id="${id}"][data-edit-field="sideMemo"]`);
          const amount = Number(amountInput ? amountInput.value : 0) || 0;
          if (amount <= 0) return alert("부업 금액을 올바르게 입력해주세요.");
          updateRecord(id, { amount, sideMemo: String(sideMemoInput ? sideMemoInput.value : "").trim() }, true);
        });
      });
    }

    function renderTotals(filteredRecords, minimumWage) {
      const categoryTotals = {};
      const categoryMinutes = {};
      let totalWorkMinutes = 0;
      filteredRecords.forEach((record) => {
        const pay = computeEntry(record, minimumWage).pay;
        categoryTotals[record.category] = (categoryTotals[record.category] || 0) + pay;
        const cfg = getCategoryConfig(record.category);
        if (cfg && !cfg.isDaily) {
          const mins = cfg.isWorkStyle ? getActualWorkMinutes(record) : (Number(record.minutes) || 0);
          totalWorkMinutes += mins;
          categoryMinutes[record.category] = (categoryMinutes[record.category] || 0) + mins;
        }
      });
      const grand = Object.values(categoryTotals).reduce((a, b) => a + b, 0);
      const cards = Object.entries(categoryTotals).map(([id, amount]) => {
        const cfg = getCategoryConfig(id);
        const title = cfg ? cfg.title : id;
        const minsText = categoryMinutes[id] ? `<div class="result-extra">근무시간: ${minutesToText(categoryMinutes[id])}</div>` : "";
        return `
          <div class="stat">
            <b>${title}</b>
            <strong>${fmtMoney(amount)}</strong>
            ${minsText}
          </div>
        `;
      }).join("");
      el.resultGrid.innerHTML = `
        ${cards}
        <div class="stat">
          <b>최종 수령액</b>
          <strong id="grandTotal">0원</strong>
          <div class="result-extra">
            <div id="totalWorkTime">총 근무시간: 0시간 0분</div>
          </div>
        </div>
      `;
      el.grandTotal = document.getElementById("grandTotal");
      el.totalWorkTime = document.getElementById("totalWorkTime");
      el.grandTotal.textContent = fmtMoney(grand);
      el.totalWorkTime.textContent = `총 근무시간: ${minutesToText(totalWorkMinutes)}`;
    }

    function render() {
      const records = loadRecords();
      const minimumWage = Number(el.minimumWage.value) || 0;
      const monthValue = el.monthPicker.value;
      renderLegend();
      el.calendarMonthTitle.textContent = formatMonthTitle(monthValue);
      const monthFiltered = records.filter((r) => r.date.startsWith(monthValue));
      const historyFiltered = applyHistoryDateFilter(monthFiltered);
      if (selectedCalendarDate && !selectedCalendarDate.startsWith(monthValue)) {
        selectedCalendarDate = null;
      }
      renderTotals(monthFiltered, minimumWage);
      renderCalendar(monthFiltered, monthValue);
      renderCalendarRecordPanel(monthFiltered, minimumWage, monthValue);
      renderHistory(historyFiltered, minimumWage);
      renderHistoryWeekSummary(historyFiltered);
      el.historyWeekLabel.textContent = getHistoryWeekLabel();
      renderHistoryVisibility();
      renderScheduleFormVisibility();
      toggleInputsByCategory();
    }

    function init() {
      const cfg = loadCloudConfig();
      relinkOrRecoverLegacyCategories();
      el.syncUser.value = cfg.user || "";
      el.syncPin.value = cfg.pin || "";
      setCloudStatus("KV 미연결", false);
      el.workDate.value = getTodayISO();
      el.monthPicker.value = getCurrentMonthValue();
      const week = getCurrentWeekRangeISO();
      el.historyStartDate.value = week.start;
      el.historyEndDate.value = week.end;
      el.toggleCategoryFormBtn.addEventListener("click", () => {
        isCategoryFormOpen = !isCategoryFormOpen;
        renderCategoryFormVisibility();
      });
      el.saveCategoryBtn.addEventListener("click", addCustomCategory);
      el.moveCategoryBtn.addEventListener("click", handleMoveCategoryMenuClick);
      el.deleteCategoryBtn.addEventListener("click", () => {
        if (!contextCategoryId) return;
        const deleteId = contextCategoryId;
        hideCategoryContextMenu();
        deleteCategory(deleteId);
      });
      document.addEventListener("click", (e) => {
        if (!el.categoryContextMenu.contains(e.target)) hideCategoryContextMenu();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") hideCategoryContextMenu();
      });
      el.minimumWage.addEventListener("input", render);
      el.monthPicker.addEventListener("change", render);
      el.workDate.addEventListener("change", () => {
        clearEntryDraftInputs();
      });
      el.connectCloudBtn.addEventListener("click", async () => {
        await connectCloud();
      });
      el.pullCloudBtn.addEventListener("click", async () => {
        await syncFromCloud();
      });
      el.pushCloudBtn.addEventListener("click", async () => {
        await syncToCloud();
      });
      el.addBtn.addEventListener("click", addRecord);
      el.addScheduleBtn.addEventListener("click", () => {
        isScheduleFormOpen = !isScheduleFormOpen;
        renderScheduleFormVisibility();
      });
      el.saveScheduleBtn.addEventListener("click", addSchedule);
      el.applyScheduleBtn.addEventListener("click", () => {
        const activeCfg = getCategoryConfig(getActiveScheduleCategory());
        if (activeCfg && activeCfg.isWorkStyle) {
          applyWorkSchedulesToMonth();
        } else {
          applyCafeSchedulesToMonth();
        }
      });
      el.prevMonthBtn.addEventListener("click", () => moveMonthBy(-1));
      el.nextMonthBtn.addEventListener("click", () => moveMonthBy(1));
      el.historyStartDate.addEventListener("change", render);
      el.historyEndDate.addEventListener("change", render);
      el.syncUser.addEventListener("input", () => {
        cloudPulledForCurrentPin = false;
        cloudOverwriteConfirmedForCurrentPin = false;
        currentCloudSyncKey = "";
        cloudExistingDataForCurrentKey = false;
        isCloudConnected = false;
      });
      el.syncPin.addEventListener("input", () => {
        cloudPulledForCurrentPin = false;
        cloudOverwriteConfirmedForCurrentPin = false;
        currentCloudSyncKey = "";
        cloudExistingDataForCurrentKey = false;
        isCloudConnected = false;
      });
      el.clearHistoryFilterBtn.addEventListener("click", () => {
        el.historyStartDate.value = "";
        el.historyEndDate.value = "";
        render();
      });
      el.prevWeekBtn.addEventListener("click", () => moveHistoryWeekBy(-1));
      el.nextWeekBtn.addEventListener("click", () => moveHistoryWeekBy(1));
      el.toggleHistoryBtn.addEventListener("click", () => {
        isHistoryCollapsed = !isHistoryCollapsed;
        renderHistoryVisibility();
      });
      const categoryList = loadCategoryConfigs();
      if ((!el.category.value || !categoryList.some((c) => c.id === el.category.value)) && categoryList.length > 0) {
        el.category.value = categoryList[0].id;
      }
      renderCategoryButtons();
      renderLegend();
      renderCategoryFormVisibility();
      toggleInputsByCategory();
      render();
      if (cfg.user && cfg.pin) {
        connectCloud().then((ok) => {
          if (ok) syncFromCloud();
        });
      }
    }

    init();
  </script>
</body>
</html>
